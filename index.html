<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlgoViz — Algorithm Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">
          <span class="logo-dot"></span>
          <span class="logo-dot"></span>
          <span class="logo-dot"></span>
        </div>
        <span class="logo-title">AlgoViz</span>
      </div>
    </div>

    <!-- Algorithm Tabs -->
    <nav class="algo-tabs">
      <button class="tab active" data-tab="sorting">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
        Sortierung
      </button>
      <button class="tab" data-tab="searching">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Suche
      </button>
    </nav>

    <div class="header-right">
      <div class="speed-control">
        <label>Geschwindigkeit</label>
        <div class="speed-track">
          <input type="range" id="speedSlider" min="50" max="1500" value="600" step="50"/>
        </div>
        <span id="speedLabel">600ms</span>
      </div>
    </div>
  </header>

  <!-- ══ MAIN ════════════════════════════════════════════════ -->
  <main class="main">

    <!-- ── SIDEBAR ───────────────────────────────────────── -->
    <aside class="sidebar">

      <!-- Array Controls -->
      <section class="sidebar-section">
        <h3 class="section-title">Array</h3>
        <button class="btn btn-primary" id="btnGenerate">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Zufällig generieren
        </button>
        <div class="input-row">
          <input type="number" id="inputAdd" placeholder="Zahl eingeben…" min="1" max="999"/>
          <button class="btn btn-secondary" id="btnAdd">+</button>
        </div>
        <div class="input-row">
          <input type="number" id="inputDelete" placeholder="Zahl löschen…" min="1" max="999"/>
          <button class="btn btn-danger-outline" id="btnDelete">−</button>
        </div>
        <button class="btn btn-ghost" id="btnReset">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
          Array zurücksetzen
        </button>
      </section>

      <!-- Algorithm Selector (Sorting) -->
      <section class="sidebar-section" id="sortSection">
        <h3 class="section-title">Algorithmus</h3>
        <div class="algo-list">
          <button class="algo-item active" data-algo="bubble">
            <span class="algo-name">Bubble Sort</span>
            <span class="algo-complexity">O(n²)</span>
          </button>
          <button class="algo-item" data-algo="merge">
            <span class="algo-name">Merge Sort</span>
            <span class="algo-complexity">O(n log n)</span>
          </button>
          <button class="algo-item" data-algo="quick">
            <span class="algo-name">Quick Sort</span>
            <span class="algo-complexity">O(n log n)</span>
          </button>
        </div>
      </section>

      <!-- Algorithm Selector (Searching) -->
      <section class="sidebar-section hidden" id="searchSection">
        <h3 class="section-title">Algorithmus</h3>
        <div class="algo-list">
          <button class="algo-item active" data-search="linear">
            <span class="algo-name">Lineare Suche</span>
            <span class="algo-complexity">O(n)</span>
          </button>
          <button class="algo-item" data-search="binary">
            <span class="algo-name">Binäre Suche</span>
            <span class="algo-complexity">O(log n)</span>
          </button>
        </div>
        <div class="search-input-group">
          <label>Gesuchte Zahl</label>
          <div class="input-row">
            <input type="number" id="searchTarget" placeholder="z.B. 42" min="1" max="999"/>
          </div>
        </div>
      </section>

      <!-- Run Controls -->
      <section class="sidebar-section">
        <button class="btn btn-run" id="btnStart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Starten
        </button>
        <button class="btn btn-stop hidden" id="btnStop">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Stopp
        </button>
      </section>

      <!-- Stats -->
      <section class="sidebar-section">
        <h3 class="section-title">Statistik</h3>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-num" id="statComparisons">0</span>
            <span class="stat-label">Vergleiche</span>
          </div>
          <div class="stat-card">
            <span class="stat-num" id="statSteps">0</span>
            <span class="stat-label">Schritte</span>
          </div>
        </div>
        <div class="stat-algo">
          <span class="stat-algo-label">Algorithmus:</span>
          <span class="stat-algo-val" id="statAlgo">—</span>
        </div>
      </section>

    </aside>

    <!-- ── CENTER ─────────────────────────────────────────── -->
    <div class="center-panel">

      <!-- Visualization Area -->
      <div class="viz-wrapper">
        <div class="viz-area" id="vizArea">
          <div class="nodes-row" id="nodesRow"></div>
        </div>
      </div>

      <!-- Description Box -->
      <div class="description-box" id="descBox">
        <div class="desc-header">
          <span class="desc-title" id="descTitle">Bubble Sort</span>
          <div class="legend">
            <span class="leg"><span class="leg-dot comparing"></span>Vergleich</span>
            <span class="leg"><span class="leg-dot swapping"></span>Tausch</span>
            <span class="leg"><span class="leg-dot found"></span>Gefunden</span>
            <span class="leg"><span class="leg-dot sorted"></span>Sortiert</span>
            <span class="leg"><span class="leg-dot pivot"></span>Pivot</span>
          </div>
        </div>
        <p class="desc-text" id="descText"></p>
        <div class="status-bar">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-msg" id="statusMsg">Bereit</span>
        </div>
      </div>

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
